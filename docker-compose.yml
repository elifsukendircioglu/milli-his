version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: milli-his-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW

  frontend:
    build:
      context: ./frontend/frontend
      dockerfile: Dockerfile
    container_name: milli-his-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped